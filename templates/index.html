<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalübersicht</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
            width: 50px;
            height: 50px;
        }
        th {
            background-color: #f2f2f2;
        }
        .box {
            background-color: #e0f7fa;
        }
        .highlight {
            background-color: #ffcccc;
        }
    </style>
</head>
<body>
    <h1>Regalübersicht</h1>
    <form action="{{ url_for('search') }}" method="get">
        <label for="project_number">Projekt Nummer:</label>
        <input type="text" id="project_number" name="project_number">
        <button type="submit">Suchen</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Ebene</th>
                <th>Fach</th>
                <th>Box</th>
            </tr>
        </thead>
        <tbody>
            {% for shelf in shelves %}
                <tr>
                    <td>{{ shelf.level }}</td>
                    <td>{{ shelf.position }}</td>
                    <td class="box {% if shelf.project_number %}highlight{% endif %}">{{ shelf.box_id }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
